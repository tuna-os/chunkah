name: Build and Publish Chunkah

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * SUN"  # Weekly on Sunday at 3am UTC

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  IMAGE_NAME: chunkah
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build chunkah image
        run: |
          # Use buildah to handle the multi-stage build with skip-unused-stages
          buildah build \
            --skip-unused-stages=false \
            --platform linux/amd64 \
            --tag "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            --tag "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:$(git rev-parse --short HEAD)" \
            .

      - name: Push chunkah image
        run: |
          podman push "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          podman push "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:$(git rev-parse --short HEAD)"
